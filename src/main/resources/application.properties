spring.application.name=BeatMarket

## POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:54320/postgres
spring.datasource.username=user
spring.datasource.password=admin

## HIKARI
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

## HIBERNATE
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

## Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/general,classpath:db/migration/inserts
spring.flyway.schemas=public

## JWT
auth.jwt.issuer=BeatMarket
auth.jwt.expirationMinutes=10

## FOR FRONTEND COOKIES
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:certificate.p12
server.ssl.key-store-password=12345

server.ssl.enabled=true
server.port=8443

## OAUTH 2
spring.security.oauth2.client.registration.google.client-id=${OAUTH2_CLIENT_ID:dummy_client_id}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_SECRET:dummy_client_secret}
spring.security.oauth2.client.registration.google.redirect-uri=https://localhost:8443/login/oauth2/code/google
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com

# CONFIRMATION EMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=barbarawojciechowskaa@gmail.com
spring.mail.password=${MAIL_SENDER_PWD:dummy_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SWAGGER SORTS CONTROLLERS ALPHABETICALLY
springdoc.swagger-ui.tags-sorter=alpha